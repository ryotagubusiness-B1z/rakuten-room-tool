<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楽天ROOM 投稿支援ツール</title>
<style>
  :root{
    --bg:#f4f4f2; --panel:#ffffff; --ink:#161616; --sub:#6b6b6b;
    --line:#e3e3e0; --line2:#d0d0cc; --accent:#161616; --accent-ink:#ffffff;
    --ok:#1f7a3d; --warn:#a23b3b; --chip:#f0f0ee;
    --radius:10px; --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  header{background:var(--panel);border-bottom:1px solid var(--line);padding:18px 24px;position:sticky;top:0;z-index:20}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}
  h1{font-size:18px;margin:0;letter-spacing:.02em;font-weight:700}
  h1 .sub{font-size:12px;color:var(--sub);font-weight:400;margin-left:10px;letter-spacing:.04em}
  nav{display:flex;gap:4px;margin-top:14px;flex-wrap:wrap}
  nav button{border:1px solid var(--line2);background:var(--panel);color:var(--sub);
    padding:8px 16px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;letter-spacing:.02em}
  nav button:hover{border-color:var(--ink);color:var(--ink)}
  nav button.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  nav button .badge{display:inline-block;min-width:18px;padding:0 5px;margin-left:6px;border-radius:999px;
    background:rgba(255,255,255,.22);font-size:11px;text-align:center}
  nav button:not(.active) .badge{background:var(--chip);color:var(--sub)}
  main{padding:26px 0 80px}
  .tab{display:none}.tab.active{display:block}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .panel-p{padding:20px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12px;color:var(--sub);font-weight:600;letter-spacing:.03em}
  input[type=text],input[type=number],select,textarea{
    border:1px solid var(--line2);background:#fff;border-radius:8px;padding:9px 11px;font-size:14px;color:var(--ink);
    font-family:inherit;outline:none;transition:.15s}
  input:focus,select:focus,textarea:focus{border-color:var(--ink)}
  textarea{resize:vertical;width:100%;min-height:96px;line-height:1.55}
  .btn{border:1px solid var(--accent);background:var(--accent);color:var(--accent-ink);
    padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;letter-spacing:.02em;transition:.15s;
    display:inline-flex;align-items:center;justify-content:center;line-height:1.3;text-decoration:none;font-family:inherit}
  .btn:hover{opacity:.86}
  .btn.ghost{background:#fff;color:var(--ink);border-color:var(--line2)}
  .btn.ghost:hover{border-color:var(--ink);opacity:1}
  .btn.sm{padding:6px 12px;font-size:12px}
  .btn.danger{background:#fff;color:var(--warn);border-color:#e2c6c6}
  .btn.danger:hover{background:var(--warn);color:#fff;border-color:var(--warn)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:18px}
  .card{border:1px solid var(--line);border-radius:var(--radius);background:#fff;overflow:hidden;display:flex;flex-direction:column}
  .card .thumb{aspect-ratio:1/1;background:#eee center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:12px}
  .card .body{padding:12px;display:flex;flex-direction:column;gap:7px;flex:1}
  .card .name{font-size:13px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:36px}
  .card .price{font-size:16px;font-weight:700}
  .card .meta{font-size:11px;color:var(--sub);display:flex;gap:10px;flex-wrap:wrap}
  .card .foot{padding:0 12px 12px}
  .tag{display:inline-block;background:var(--chip);border:1px solid var(--line);border-radius:999px;
    padding:3px 10px;font-size:12px;color:var(--ink);cursor:pointer;user-select:none;transition:.12s}
  .tag:hover{border-color:var(--ink)}
  .tag.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .stars{color:#161616;letter-spacing:1px}
  .empty{text-align:center;color:var(--sub);padding:56px 20px;font-size:14px}
  .item{display:flex;gap:14px;padding:14px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;align-items:flex-start}
  .item .thumb{width:70px;height:70px;border-radius:8px;flex-shrink:0;background:#eee center/cover}
  .item .grow{flex:1;min-width:0}
  .item .name{font-weight:600;font-size:14px;margin-bottom:3px}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .toolbar h2{font-size:15px;margin:0;letter-spacing:.02em}
  .stack{display:flex;flex-direction:column;gap:14px}
  .postcard{border:1px solid var(--line);border-radius:var(--radius);background:#fff}
  .postcard .hd{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line);gap:10px}
  .postcard .hd .name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .postcard .bd{padding:14px}
  .post-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .preview{background:#fafafa;border:1px dashed var(--line2);border-radius:8px;padding:12px;font-size:13px;white-space:pre-wrap;line-height:1.65}
  .muted{color:var(--sub);font-size:12px}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:640px){.split{grid-template-columns:1fr}.post-actions{width:100%}.post-actions .btn{flex:1}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13px;opacity:0;
    transition:.25s;pointer-events:none;z-index:50;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .banner{background:#fbfbf9;border:1px solid var(--line);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--sub);margin-bottom:16px}
  .banner b{color:var(--ink)}
  .checkline{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--sub)}
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden}
  .seg button{border:none;background:#fff;padding:7px 13px;font-size:12px;cursor:pointer;color:var(--sub);font-weight:600}
  .seg button.active{background:var(--accent);color:#fff}
  .divider{height:1px;background:var(--line);margin:16px 0}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>楽天ROOM 投稿支援ツール <span class="sub">選定 → 紹介文 → タグ → 投稿リスト</span></h1>
    <nav id="nav">
      <button data-tab="search" class="active">① 検索・絞り込み</button>
      <button data-tab="pool">② 候補リスト <span class="badge" id="poolBadge">0</span></button>
      <button data-tab="write">③ 紹介文＆タグ <span class="badge" id="writeBadge">0</span></button>
      <button data-tab="posts">④ 投稿リスト <span class="badge" id="postBadge">0</span></button>
    </nav>
  </div>
</header>

<main class="wrap">

  <!-- ① 検索 -->
  <section class="tab active" id="tab-search">
    <div class="banner" id="dataBanner">現在は <b>デモデータ</b> で動作中です。楽天APIキーを設定すると本物の商品検索になります。</div>
    <div class="panel panel-p">
      <div class="row">
        <div class="field" style="flex:1;min-width:180px">
          <label>キーワード</label>
          <input type="text" id="q" placeholder="例:スキンケア 化粧水">
        </div>
        <div class="field">
          <label>最低価格</label>
          <input type="number" id="minP" placeholder="0" style="width:110px">
        </div>
        <div class="field">
          <label>最高価格</label>
          <input type="number" id="maxP" placeholder="上限なし" style="width:110px">
        </div>
        <div class="field">
          <label>最低レビュー数</label>
          <input type="number" id="minR" placeholder="0" style="width:110px">
        </div>
        <div class="field">
          <label>最低評価</label>
          <select id="minRate">
            <option value="0">指定なし</option>
            <option value="3">★3.0以上</option>
            <option value="3.5">★3.5以上</option>
            <option value="4">★4.0以上</option>
            <option value="4.5">★4.5以上</option>
          </select>
        </div>
        <div class="field">
          <label>並び替え</label>
          <select id="sort">
            <option value="rank">おすすめ順</option>
            <option value="reviewCount">レビュー数が多い順</option>
            <option value="reviewRate">評価が高い順</option>
            <option value="priceAsc">価格が安い順</option>
            <option value="priceDesc">価格が高い順</option>
          </select>
        </div>
        <button class="btn" id="searchBtn">検索</button>
      </div>
      <div class="grid" id="results"></div>
    </div>
  </section>

  <!-- ② 候補 -->
  <section class="tab" id="tab-pool">
    <div class="toolbar">
      <h2>候補リスト</h2>
      <div style="display:flex;gap:8px">
        <button class="btn ghost sm" id="clearPool">全部クリア</button>
        <button class="btn sm" id="toWrite">選定して紹介文へ →</button>
      </div>
    </div>
    <div class="stack" id="poolList"></div>
  </section>

  <!-- ③ 紹介文＆タグ -->
  <section class="tab" id="tab-write">
    <div class="toolbar">
      <h2>紹介文＆ハッシュタグ</h2>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <span class="muted">トーン一括:</span>
        <div class="seg" id="toneSeg">
          <button data-tone="polite" class="active">丁寧</button>
          <button data-tone="casual">カジュアル</button>
          <button data-tone="oshi">推し語り</button>
        </div>
        <button class="btn sm" id="regenAll">全部を再生成</button>
      </div>
    </div>
    <div class="banner"><b>未購入の商品にも対応</b> 商品名をもとに、購入や使用の経験があると受け取られない紹介文を生成します。変動しやすい価格・レビュー情報は本文へ入れません。</div>
    <div class="stack" id="writeList"></div>
  </section>

  <!-- ④ 投稿リスト -->
  <section class="tab" id="tab-posts">
    <div class="toolbar">
      <h2>投稿リスト</h2>
      <div style="display:flex;gap:8px">
        <button class="btn ghost sm" id="copyAll">紹介文をまとめてコピー</button>
        <button class="btn sm" id="exportCsv">CSV書き出し</button>
      </div>
    </div>
    <div class="banner"><b>投稿は3ステップ</b> ①紹介文をコピー ②商品ページを開いてROOMアイコンを押す ③紹介文を貼り付けて投稿します。</div>
    <div class="stack" id="postList"></div>
  </section>

</main>

<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   楽天ROOM 投稿支援ツール  —  単一HTMLファイル / ブラウザ内で完結
   データは localStorage に自動保存されます。
   ========================================================================= */

/* ------------------------------------------------------------------
   ▼▼▼ 楽天APIを使うとき、ここだけ書き換えてください ▼▼▼
   1) 楽天ウェブサービス( https://webservice.rakuten.co.jp/ )で無料の
      アプリID(APPID)を取得
   2) 下の APP_ID に貼り付け
   3) USE_API を true に変更
   これだけで、デモデータ→本物の楽天商品検索に切り替わります。UIは変更不要。
------------------------------------------------------------------ */
const APP_ID     = "fee86daa-ec3f-48fe-a1f1-47b4812c7b3d";           // アプリケーションID
const ACCESS_KEY = "pk_ZNlwtYGSJgQc75MfjFxDrfnPDiX1uTQuAYB9q5B1FCL"; // アクセスキー
const AFFILIATE_ID = "";  // 空のまま(報酬は投稿者=相手のROOM側に付く。Ryoのを入れると報酬がRyoに向く)
const USE_API  = true;    // ← APIを使うなら true に

/* 商品データ取得の唯一の入口。UI側はこの関数しか呼ばない。
   デモ⇄API の切り替えはここで吸収される。 */
async function fetchProducts(query){
  if(USE_API && APP_ID && ACCESS_KEY){
    return await fetchFromRakuten(query);   // 本番:楽天API(新エンドポイント)
  }
  return filterDemo(query);                 // デモ:内蔵サンプル
}

/* --- 本番用:楽天商品検索API(2026移行版 openapi.rakuten.co.jp / CORS対応 fetch) ---
   登録URL(このツールの公開URL)以外からは楽天側が弾く(リファラー制限)ので、
   ACCESS_KEY を埋め込んでも他サイトからの盗用はできない仕様。 */
async function fetchFromRakuten(query){
  const p = new URLSearchParams({
    applicationId: APP_ID,
    accessKey: ACCESS_KEY,
    format: "json",
    keyword: query.q || "",
    hits: "30"
  });
  if(AFFILIATE_ID) p.set("affiliateId", AFFILIATE_ID);
  if(query.minP) p.set("minPrice", query.minP);
  if(query.maxP) p.set("maxPrice", query.maxP);
  const sortMap={rank:"standard",reviewCount:"-reviewCount",reviewRate:"-reviewAverage",priceAsc:"+itemPrice",priceDesc:"-itemPrice"};
  p.set("sort", sortMap[query.sort]||"standard");

  const url="https://openapi.rakuten.co.jp/ichibams/api/IchibaItem/Search/20260701?"+p.toString();
  let res;
  try{ res=await fetch(url); }
  catch(e){ throw new Error("ネットワークエラー。通信環境を確認してください。"); }
  if(!res.ok){
    if(res.status===429) throw new Error("アクセスが集中しています。10秒ほど待って再検索してください。");
    if(res.status===403) throw new Error("このURLからのアクセスが許可されていません(リファラー設定を確認)。");
    throw new Error("楽天APIに接続できませんでした(コード "+res.status+")");
  }
  const data=await res.json();
  let items=(data.Items||[]).map(x=>x.Item||x).map(it=>({
    id: it.itemCode||it.itemUrl, name: it.itemName, price: it.itemPrice,
    reviewCount: it.reviewCount||0, reviewRate: it.reviewAverage||0,
    genre: "", url: it.affiliateUrl||it.itemUrl,
    image: (it.mediumImageUrls&&it.mediumImageUrls[0]&&it.mediumImageUrls[0].imageUrl)||"",
    shop: it.shopName
  }));
  return applyClientFilter(items,query);
}

/* レビュー数/評価の絞り込みはクライアント側で共通適用 */
function applyClientFilter(items,q){
  return items.filter(it=>
    (!q.minR   || it.reviewCount>=q.minR) &&
    (!q.minRate|| it.reviewRate>=q.minRate)
  );
}

/* =====================  デモデータ  ===================== */
const DEMO_PRODUCTS = [
  {id:"d1", name:"高保湿 化粧水 200mL 敏感肌用 無香料 セラミド配合", price:1480, reviewCount:2841, reviewRate:4.6, genre:"美容・コスメ", url:"https://example.com/d1", image:"", shop:"うるおい堂"},
  {id:"d2", name:"オーガニック プロテイン チョコ味 1kg 女性向け ソイ", price:3280, reviewCount:1520, reviewRate:4.4, genre:"食品・健康", url:"https://example.com/d2", image:"", shop:"ヘルスラボ"},
  {id:"d3", name:"ステンレス タンブラー 480mL 真空断熱 保温保冷 マット", price:1980, reviewCount:934, reviewRate:4.7, genre:"キッチン・日用品", url:"https://example.com/d3", image:"", shop:"暮らし雑貨店"},
  {id:"d4", name:"ワイヤレスイヤホン ノイズキャンセリング 低遅延 防水IPX5", price:4990, reviewCount:5210, reviewRate:4.3, genre:"家電・ガジェット", url:"https://example.com/d4", image:"", shop:"サウンドギア"},
  {id:"d5", name:"リネン混 ワンピース ゆったり 春夏 マット素材 大人カジュアル", price:3960, reviewCount:412, reviewRate:4.2, genre:"ファッション", url:"https://example.com/d5", image:"", shop:"apparel mono"},
  {id:"d6", name:"珪藻土 バスマット 速乾 抗菌 60×39cm ホワイト", price:2480, reviewCount:1789, reviewRate:4.5, genre:"キッチン・日用品", url:"https://example.com/d6", image:"", shop:"暮らし雑貨店"},
  {id:"d7", name:"美容液 ビタミンC誘導体 30mL 毛穴 くすみ 高濃度", price:2680, reviewCount:3320, reviewRate:4.5, genre:"美容・コスメ", url:"https://example.com/d7", image:"", shop:"うるおい堂"},
  {id:"d8", name:"折りたたみ 傘 軽量 210g 自動開閉 撥水 メンズ レディース", price:2180, reviewCount:876, reviewRate:4.1, genre:"ファッション", url:"https://example.com/d8", image:"", shop:"デイリーモノ"},
  {id:"d9", name:"ドリップコーヒー 個包装 40袋 深煎り ブレンド 香り", price:1580, reviewCount:2210, reviewRate:4.6, genre:"食品・健康", url:"https://example.com/d9", image:"", shop:"焙煎工房"},
  {id:"d10", name:"LEDデスクライト 目に優しい 調光調色 USB クランプ式 マット黒", price:3480, reviewCount:640, reviewRate:4.4, genre:"家電・ガジェット", url:"https://example.com/d10", image:"", shop:"サウンドギア"},
  {id:"d11", name:"エコバッグ 折りたたみ 大容量 25L 撥水 コンパクト 無地", price:1280, reviewCount:1502, reviewRate:4.5, genre:"キッチン・日用品", url:"https://example.com/d11", image:"", shop:"デイリーモノ"},
  {id:"d12", name:"入浴剤 アソート 30個 炭酸 発汗 疲労回復 ギフト", price:2980, reviewCount:4102, reviewRate:4.7, genre:"美容・コスメ", url:"https://example.com/d12", image:"", shop:"リラクバス"},
];
function filterDemo(q){
  let r=DEMO_PRODUCTS.slice();
  if(q.q){const kws=q.q.split(/\s+/).filter(Boolean);
    r=r.filter(it=>kws.every(k=>(it.name+it.genre).toLowerCase().includes(k.toLowerCase())));}
  if(q.minP) r=r.filter(it=>it.price>=q.minP);
  if(q.maxP) r=r.filter(it=>it.price<=q.maxP);
  r=applyClientFilter(r,q);
  const s=q.sort;
  if(s==="reviewCount") r.sort((a,b)=>b.reviewCount-a.reviewCount);
  else if(s==="reviewRate") r.sort((a,b)=>b.reviewRate-a.reviewRate);
  else if(s==="priceAsc") r.sort((a,b)=>a.price-b.price);
  else if(s==="priceDesc") r.sort((a,b)=>b.price-a.price);
  return Promise.resolve(r);
}

/* =====================  状態(localStorage)  ===================== */
const STORE_KEY="rakuten_room_tool_v1";
const INTRO_COPY_VERSION=6;
const TAG_SUGGEST_VERSION=3;
let state;
function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem(STORE_KEY));
    if(s&&s.pool){
      let migrated=false;
      Object.values(s.pool).forEach(e=>{
        if(!e||!e.product) return;
        if(e.tagVersion!==TAG_SUGGEST_VERSION){
          // 安全な手動タグは残し、旧版由来の販促語・ブランド名・セット表記だけを除去する
          e.tags=migrateLegacyTags(e);
          e.tagVersion=TAG_SUGGEST_VERSION;
          migrated=true;
        }else if(!e.tags||Object.keys(e.tags).length===0){
          // 執筆画面を経由せず投稿画面へ進んでも、未初期化のタグを空のままにしない
          e.tags=migrateLegacyTags(e);
          migrated=true;
        }
        if(e.introVersion!==INTRO_COPY_VERSION){
          if(e.intro&&shouldRegenerateLegacyIntro(e)){
            // v5には編集済みフラグがなかったため、誤判定しても元へ戻せるよう必ず退避する
            if(!e.legacyIntroBackup) e.legacyIntroBackup=e.intro;
            regenerateIntro(e,e.tone||"polite");
          }
          else{
            e.introVersion=INTRO_COPY_VERSION;
            if(e.intro&&e.introEdited==null) e.introEdited=true;
          }
          migrated=true;
        }
      });
      if(migrated) localStorage.setItem(STORE_KEY,JSON.stringify(s));
      return s;
    }
  }catch(e){}
  return {pool:{}};   // pool: id -> {product, selected, tone, intro, introVersion, introEdited, legacyIntroBackup, tags, tagVersion}
}
function save(){localStorage.setItem(STORE_KEY,JSON.stringify(state));updateBadges();}
function updateBadges(){
  const ids=Object.keys(state.pool);
  const selected=ids.filter(id=>state.pool[id].selected);
  poolBadge.textContent=ids.length;
  writeBadge.textContent=selected.length;
  postBadge.textContent=selected.length;
}

/* =====================  紹介文・ハッシュタグ生成  ===================== */
const PROMO_WORDS=/(?:クーポン|ポイント\s*\d+倍|P\s*\d+倍|\d+(?:\.\d+)?\s*(?:%|％)\s*(?:OFF|オフ|割引)|半額|(?:SALE|セール)|ランキング|楽天(?:市場)?(?:総合|デイリー|週間|月間)?\s*\d+位|\d+冠|最安|特価|激安|お買い得|今だけ|本日限定|期間限定|店内全品|送料無料|スーパーSALE|楽天SS|お買い物マラソン|マラソン期間)/i;
const PRODUCT_CATEGORIES=[
  "ワイヤレスイヤホン","モバイルバッテリー","スマートウォッチ","ノイズキャンセリングイヤホン",
  "折りたたみ日傘","折りたたみ傘","フェイスクリーム","トリートメント","ファンデーション",
  "ステンレスタンブラー","ボトルスタンド","水切りラック","デスクライト","サーキュレーター","バスマット","エコバッグ",
  "プロテイン","ワンピース","化粧水","美容液","シャンプー","タンブラー","コーヒー",
  "ドライヤー","ヘッドホン","イヤホン","スニーカー","マットレス","入浴剤","収納ケース",
  "卵焼きフライパン","フライパン","マグカップ","ペットフード","日傘","雨傘","長傘","帽子","バッグ","リュック",
  "財布","ブラウス","スカート","サンダル","タオル","枕","掛け布団","チェア","テーブル",
  "掃除機","扇風機","加湿器","炊飯器","トースター","電子レンジ","クリーム","乳液","お茶",
  "お米","絵本","おもちゃ","パンツ","包丁","傘"
];
const FEATURE_STOP=new Set(["レディース","メンズ","男女兼用","ユニセックス","女性向け","男性向け","大人","キッズ","ベビー","新品","正規品","公式","おすすめ","人気","商品","タワー","単品","セット","選べる","よりどり","から","点","個","本","枚","組"]);
const BRAND_STOP=new Set(["carote","カローテ"]);
const PACKAGE_ONLY_FEATURE=/^(?:(?:選べる|よりどり))?\d+(?:点|個|本|枚|組)(?:セット)?(?:[がをはでのにとへ]|(?:から)?(?:選べる|よりどり))?$/;

function normalizeProductText(value){
  return String(value||"").normalize("NFKC").replace(/[\u200B-\u200D\uFEFF]/g,"").replace(/\s+/g," ").trim();
}
function isPackageOnlyFeature(value){
  const token=normalizeProductText(value).replace(/\s+/g,"");
  return PACKAGE_ONLY_FEATURE.test(token)||/^(?:(?:から)?(?:選べる|よりどり)|(?:点|個|本|枚|組)?セット(?:(?:から)?(?:選べる|よりどり))?)$/.test(token);
}
function stripPromoText(value){
  let text=normalizeProductText(value);
  // 販促語を含む括弧だけを内容ごと除去し、仕様を示す括弧は中身を残す
  const blocks=[/【[^】]*】/g,/\[[^\]]*\]/g,/《[^》]*》/g,/〈[^〉]*〉/g,/＜[^＞]*＞/g,/\([^)]*\)/g,/（[^）]*）/g,/＼[^／]*／/g];
  blocks.forEach(re=>{text=text.replace(re,block=>PROMO_WORDS.test(block)?" ":` ${block.slice(1,-1)} `);});
  text=text
    .replace(/楽天(?:市場)?(?:総合|デイリー|週間|月間|年間)?(?:ランキング)?\s*\d+\s*位(?:\d+\s*冠)?/gi," ")
    .replace(/(?:年間)?ランキング受賞/gi," ")
    .replace(/(?:最大|店内全品)?\s*\d+(?:\.\d+)?\s*(?:%|％)\s*(?:OFF|オフ|割引)/gi," ")
    .replace(/クーポン(?:利用)?(?:で|配布中|対象|価格)?/gi," ")
    .replace(/(?:最安|特価)?\s*\d[\d,]*(?:円)(?:から|より|~|～|-)?/g," ")
    .replace(/(?:送料無料|今すぐ使える|今だけ|本日限定|期間限定|店内全品|お買い得)/g," ")
    .replace(/[!！★☆◆◇■□●○◎]+/g," ")
    .replace(/\s+/g," ")
    .trim();
  return text;
}
function tokenizeProductName(value){
  return stripPromoText(value).split(/[\s　・,、。/／|｜:：;；]+/).map(token=>token.replace(/^[「」『』【】\[\]《》〈〉＜＞()（）]+|[「」『』【】\[\]《》〈〉＜＞()（）]+$/g,"").trim()).filter(token=>{
    if(!token||PROMO_WORDS.test(token)) return false;
    if(/^\d[\d,.]*(?:円|%|％)?(?:~|～|-)?$/.test(token)) return false;
    return true;
  });
}
function findProductSubject(cleanedName,tokens){
  const joined=cleanedName.replace(/\s+/g,"");
  if(/(?:(?:卵|玉子|たまご)焼き(?:フライパン|器)|エッグパン)/.test(joined)) return "卵焼きフライパン";
  if(tokens.some(token=>normalizeProductText(token)==="パン")) return "パン";
  let found="",foundAt=Infinity;
  PRODUCT_CATEGORIES.forEach(category=>{
    const at=joined.indexOf(category);
    if(at>=0&&(at<foundAt||(at===foundAt&&category.length>found.length))){found=category;foundAt=at;}
  });
  if(found) return found;
  const fallback=tokens.find((token,index)=>{
    const normalized=normalizeProductText(token);
    const next=normalizeProductText(tokens[index+1]||"");
    return normalized&&next!=="フリー"&&normalized!=="フリー"&&!FEATURE_STOP.has(normalized)&&!isPackageOnlyFeature(normalized)&&!isBrandLikeToken(normalized,index,tokens,"商品")&&!/^\d/.test(normalized)&&!/^[A-Za-z][A-Za-z0-9._-]{2,}$/.test(normalized)&&normalized.length>=2;
  })||"商品";
  return fallback.slice(0,24);
}
function isSubjectToken(token,subject){
  if(subject!=="商品"&&token.length>=2&&subject.includes(token)) return true;
  return subject==="卵焼きフライパン"&&/^(?:(?:卵|玉子|たまご)焼き(?:フライパン|器)?|エッグパン)$/.test(token);
}
function isKnownBrandText(value){
  const normalized=normalizeProductText(value).toLowerCase();
  return BRAND_STOP.has(normalized)||/^(?:caroteカローテ|カローテcarote)$/.test(normalized);
}
const LATIN_LETTER_READINGS={a:"エー",b:"ビー",c:"シー",d:"ディー",e:"イー",f:"エフ",g:"ジー",h:"エイチ",i:"アイ",j:"ジェー",k:"ケー",l:"エル",m:"エム",n:"エヌ",o:"オー",p:"ピー",q:"キュー",r:"アール",s:"エス",t:"ティー",u:"ユー",v:"ブイ",w:"ダブリュー",x:"エックス",y:"ワイ",z:"ゼット"};
function latinLetterReading(value){
  const letters=normalizeProductText(value).toLowerCase();
  if(!/^[a-z]{2,6}$/.test(letters)) return "";
  return Array.from(letters).map(letter=>LATIN_LETTER_READINGS[letter]||"").join("");
}
function isBrandLikeToken(token,index,tokens,subject){
  if(isKnownBrandText(token)) return true;
  const combined=normalizeProductText(token).match(/^([A-Za-z]{2,6})([ァ-ヶー]+)$/);
  if(combined&&latinLetterReading(combined[1])===combined[2]) return true;
  const previous=normalizeProductText(tokens[index-1]||"");
  const normalized=normalizeProductText(token);
  if(latinLetterReading(previous)===normalized) return true;
  if(!/^[A-Za-z][A-Za-z0-9._-]{2,}$/.test(previous)||!/^[ァ-ヶー]{3,}$/.test(normalized)) return false;
  // 英字ブランド直後の読み仮名は除く。ただし既知の仕様語・商品カテゴリは保持する
  return !isStrongFeature(normalized)&&!PRODUCT_CATEGORIES.some(category=>category===normalized||category.includes(normalized));
}
function isProductVariantToken(token,subject){
  if(isSubjectToken(token,subject)) return true;
  const withoutSet=token.replace(/セット$/," ").trim();
  return withoutSet.length>=2&&subject!=="商品"&&subject.includes(withoutSet);
}
function canonicalizeFeatureToken(token){
  return token
    .replace(/^ih(?=対応$)/i,"IH")
    .replace(/^uv(?=カット|100|%|％)/i,"UV")
    .replace(/^usb(?=[-A-Za-z0-9])/i,"USB");
}
function featureGroup(token){
  if(/軽量|\d+g/i.test(token)) return "weight";
  if(/UV|紫外線|遮光/i.test(token)) return "sun";
  if(/自動開閉|ワンタッチ/.test(token)) return "open";
  if(/防水|撥水/.test(token)) return "water";
  if(/保温|保冷|断熱/.test(token)) return "temperature";
  if(/収納/.test(token)) return "storage";
  if(/速乾|乾燥|乾かす/.test(token)) return "dry";
  if(/折りたた|コンパクト/.test(token)) return "portable";
  return token.toLowerCase().replace(/[^\p{L}\p{N}]/gu,"");
}
function isStrongFeature(token){
  return /完全|超|高|100|自動|形状記憶|晴雨兼用|真空断熱|速乾|乾燥|乾かす|収納|抗菌|防水|撥水|保温|保冷|無香料|無添加|低遅延|ノイズキャンセリング|調光|調色|大容量|コンパクト|洗える|遮熱|丈夫|セラミド|ツボクサ|マデカッソシド|ヒアルロン酸|ナイアシンアミド|ビタミンC|レチノール|コラーゲン|オーガニック|グルテンフリー|アルコールフリー|シリコンフリー|パラベンフリー|国産米粉|IH対応|マーブルコート|蓋付き|取っ手.*取れ|手入れ簡単|くっつきにく/i.test(token);
}
function featureScore(token,index){
  let score=100-index;
  if(isStrongFeature(token)) score+=100;
  return score;
}
function extractProductFeatures(tokens,subject){
  const candidates=[];
  tokens.forEach((raw,index)=>{
    let token=raw;
    const next=normalizeProductText(tokens[index+1]||"");
    if(next==="フリー") return;
    if(normalizeProductText(token)==="フリー"){
      const previous=normalizeProductText(tokens[index-1]||"");
      if(!previous||isKnownBrandText(previous)||isSubjectToken(previous,subject)) return;
      token=`${previous}フリー`;
    }
    if(isProductVariantToken(token,subject)||isBrandLikeToken(token,index,tokens,subject)) return;
    if(subject!=="商品"&&token.includes(subject)) token=token.split(subject).join("");
    token=canonicalizeFeatureToken(token.replace(/^[\-+]+|[\-+]+$/g,"").trim());
    if(!token||token===subject||FEATURE_STOP.has(token)||PROMO_WORDS.test(token)) return;
    if(/^[がをはでのにとへ]$/.test(token)) return;
    if(isPackageOnlyFeature(token)) return;
    if(/^\d+(?:\.\d+)?(?:[*×xX]\d+(?:\.\d+)?){1,2}(?:cm|mm)?$/i.test(token)) return;
    if(/^\d+(?:\.\d+)?(?:mL|ml|ML|L|kg|g|cm|mm|本|個|枚|袋|段)$/i.test(token)) return;
    if(/^(?:春|夏|秋|冬|春夏|秋冬)$/.test(token)) return;
    if(/^[A-Za-z][A-Za-z0-9._-]{2,}$/.test(token)&&!/^(?:UV|IPX|LED|USB)/i.test(token)) return;
    if(/(?:株式会社|有限会社|実業|工業|産業|商店|本舗)$/.test(token)) return;
    if(/(?:傘|化粧水|美容液|イヤホン|ワンピース|タンブラー|バッグ|帽子)$/.test(token)) return;
    candidates.push({token,index,score:featureScore(token,index),group:featureGroup(token),strong:isStrongFeature(token)});
  });
  candidates.sort((a,b)=>b.score-a.score||a.index-b.index);
  const strongCandidates=candidates.filter(item=>item.strong);
  const ranked=strongCandidates.length>=2?strongCandidates:candidates;
  const groups=new Set(),features=[];
  ranked.forEach(item=>{
    if(features.length>=3||groups.has(item.group)) return;
    if(features.some(existing=>existing.includes(item.token)||item.token.includes(existing))) return;
    groups.add(item.group);features.push(item.token);
  });
  return features;
}
function summarizeProduct(p){
  const cleanedName=stripPromoText(p.name);
  const tokens=tokenizeProductName(p.name);
  const subject=findProductSubject(cleanedName,tokens);
  return {subject,features:extractProductFeatures(tokens,subject),cleanedName};
}
function suggestTags(p){
  const base=new Set();
  const summary=summarizeProduct(p);
  if(summary.subject!=="商品") base.add(summary.subject);
  summary.features.forEach(feature=>base.add(feature));
  const genreTags={"美容・コスメ":["美容","スキンケア","コスメ好きさんと繋がりたい"],
    "食品・健康":["おうちごはん","ヘルシー","食品"],
    "キッチン・日用品":["暮らし","日用品","シンプルライフ"],
    "家電・ガジェット":["ガジェット","便利グッズ","家電"],
    "ファッション":["ファッション","コーデ","大人カジュアル"]};
  (genreTags[p.genre]||[]).forEach(t=>base.add(t));
  ["楽天ROOM","楽天room発見隊","おすすめ"].forEach(t=>base.add(t));

function normalizeIntroText(value){
  return String(value||"").normalize("NFKC").replace(/\r\n?/g,"\n").trim();
}
function looksLikeLegacyGeneratedIntro(e){
  const intro=normalizeIntroText(e.intro);
  if(!intro) return false;
  const name=String(e.product&&e.product.name||"");
  const v4=[
    `${name}\n\n気になるアイテムを見つけました。\n詳しい商品情報は商品ページでチェックしてみてください!`,
    `【これはチェックしたい】${name}\n\n気になるアイテムとしてご紹介🤍\n詳しい商品情報は、商品ページでチェックしてみてください。`,
    `${name}\n\n商品の詳しい情報は、商品ページからご確認いただけます。\n気になる方はぜひチェックしてみてください。`
  ].map(normalizeIntroText);
  if(v4.includes(intro)) return true;

  // v5は商品ごとに抽出語が異なるため、固定3行テンプレートの全体形だけを厳密に照合する
  const lines=intro.split("\n").map(line=>line.trim()).filter(Boolean);
  if(lines.length!==3) return false;
  if(/^気になる.+をピックアップ。$/.test(lines[0])&&/^(?:特徴や仕様を確認しておきたいアイテムです。|.+といった特徴があります。)$/.test(lines[1])&&lines[2]==="詳しくは商品ページを見てみてください。") return true;
  if(/^注目したい.+をピックアップ🤍$/.test(lines[0])&&/^(?:特徴や仕様が気になるアイテムです。|.+など、気になるポイントがそろっています。)$/.test(lines[1])&&lines[2]==="詳しくは商品ページでチェックしてみてください。") return true;
  return /^.+の中から、気になるアイテムをピックアップしました。$/.test(lines[0])&&/^(?:特徴や仕様を確認しておきたいアイテムです。|.+といった特徴があります。)$/.test(lines[1])&&lines[2]==="詳しい仕様やカラーは、商品ページでご確認ください。";
}
function shouldRegenerateLegacyIntro(e){
  if(e.introEdited===true) return false;

function restoreLegacyIntro(e){

function migrateLegacyTags(e){

function formatFeatureSentence(features,tone){
  if(features.length===0) return "仕様を確認して選びたいアイテムです。";

          <div class="field">
            <label>紹介文(編集できます)</label>
            <textarea data-intro="${id}">${esc(e.intro)}</textarea>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
              <button class="btn ghost sm" data-regen="${id}">この紹介文を再生成</button>
              ${e.legacyIntroBackup?`<button class="btn ghost sm" data-restore-intro="${id}">移行前の文に戻す</button>`:""}
            </div>
          </div>
          <div class="field">
            <label>ハッシュタグ(クリックでON/OFF)</label>
            <div>${allTags.map(t=>`<span class="tag ${e.tags[t]?'on':''}" data-tag="${id}::${esc(t)}">#${esc(t)}</span>`).join(" ")}</div>
            <div class="muted" style="margin-top:8px">選択中: <span data-tagcount="${id}">${Object.values(e.tags).filter(Boolean).length}</span>個</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");

  writeList.querySelectorAll("[data-intro]").forEach(t=>t.oninput=()=>{
    const e=state.pool[t.dataset.intro];e.intro=t.value;e.introVersion=INTRO_COPY_VERSION;e.introEdited=true;save();});
  writeList.querySelectorAll("[data-regen]").forEach(b=>b.onclick=()=>{
    const id=b.dataset.regen,e=state.pool[id];regenerateIntro(e,e.tone||"polite");save();renderWrite();});
  writeList.querySelectorAll("[data-restore-intro]").forEach(b=>b.onclick=()=>{
    const e=state.pool[b.dataset.restoreIntro];if(restoreLegacyIntro(e)){save();renderWrite();}});
  writeList.querySelectorAll("[data-toneseg]").forEach(seg=>{
    seg.querySelectorAll("button").forEach(btn=>btn.onclick=()=>{
      const id=seg.dataset.toneseg,e=state.pool[id];regenerateIntro(e,btn.dataset.t);save();renderWrite();});
  });
  writeList.querySelectorAll("[data-tag]").forEach(tg=>tg.onclick=()=>{
    const [id,tag]=tg.dataset.tag.split("::");const e=state.pool[id];
    e.tags[tag]=!e.tags[tag];save();renderWrite();});
}

function buildCommentText(e){
  const tags=Object.keys(e.tags).filter(t=>e.tags[t]).map(t=>"#"+t).join(" ");
  return [e.intro,tags].filter(Boolean).join("\n\n");
}
function renderPosts(){
  const ids=Object.keys(state.pool).filter(id=>state.pool[id].selected);
  if(!ids.length){postList.innerHTML=`<div class="empty">投稿対象がありません。商品を選定し、紹介文を用意してください。</div>`;return;}
  postList.innerHTML=ids.map((id,i)=>{
    const e=state.pool[id];if(!e.intro)regenerateIntro(e,e.tone||"polite");
    const text=buildCommentText(e),p=e.product;
    return `<div class="postcard">
      <div class="hd"><span class="name">投稿 ${i+1} ・ ${esc(p.name)}</span>
        <div class="post-actions">
          <button class="btn sm" data-copy="${id}">1 紹介文をコピー</button>
          <a class="btn ghost sm" href="${esc(p.url)}" target="_blank" rel="noopener noreferrer" aria-label="${esc(p.name)}の商品ページを新しいタブで開く">2 商品ページを開く</a>
        </div></div>
      <div class="bd"><div class="preview" id="pv-${id}">${esc(text)}</div>
        <div class="muted" style="margin-top:8px">コピー内容に商品URL・価格・レビュー情報は含まれません。</div></div>
    </div>`;
  }).join("");
  postList.querySelectorAll("[data-copy]").forEach(b=>b.onclick=()=>{
    copy(buildCommentText(state.pool[b.dataset.copy]));toast("紹介文をコピーしました");});
}

/* =====================  共通UI  ===================== */
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function copy(text){
  if(navigator.clipboard){navigator.clipboard.writeText(text).catch(()=>fallbackCopy(text));}
  else fallbackCopy(text);
}
function fallbackCopy(text){const t=document.createElement("textarea");t.value=text;document.body.appendChild(t);t.select();try{document.execCommand("copy");}catch(e){}t.remove();}
let toastTimer;
function toast(msg){const t=el("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),1600);}

/* =====================  タブ切り替え  ===================== */
let currentTone="polite";
el("nav").querySelectorAll("button").forEach(b=>b.onclick=()=>showTab(b.dataset.tab));
function showTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el("nav").querySelectorAll("button").forEach(b=>b.classList.toggle("active",b.dataset.tab===name));
  el("tab-"+name).classList.add("active");
  if(name==="pool")renderPool();
  if(name==="write")renderWrite();
  if(name==="posts")renderPosts();
}

/* =====================  イベント  ===================== */
let lastResults=[];
el("searchBtn").onclick=doSearch;
el("q").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch();});
async function doSearch(){
  const q={
    q:el("q").value.trim(),
    minP:+el("minP").value||0, maxP:+el("maxP").value||0,
    minR:+el("minR").value||0, minRate:+el("minRate").value||0,
    sort:el("sort").value
  };
  // 本番API はキーワード必須。空なら叩かず案内を出す。
  if(USE_API && APP_ID && ACCESS_KEY && !q.q){
    results.innerHTML=`<div class="empty" style="grid-column:1/-1">上のキーワード欄に、探したい商品名やジャンル(例:化粧水、プロテイン、タンブラー)を入れて「検索」を押してください。</div>`;
    return;
  }
  results.innerHTML=`<div class="empty" style="grid-column:1/-1">検索中…</div>`;
  try{lastResults=await fetchProducts(q);renderResults(lastResults);}
  catch(e){results.innerHTML=`<div class="empty" style="grid-column:1/-1">取得に失敗しました:${esc(e.message||e)}</div>`;}
}

el("clearPool").onclick=()=>{if(confirm("候補リストを全部消しますか?")){state.pool={};save();renderPool();}};
el("toWrite").onclick=()=>showTab("write");
el("regenAll").onclick=()=>{Object.values(state.pool).forEach(e=>{if(e.selected)regenerateIntro(e,e.tone||"polite");});save();renderWrite();toast("再生成しました");};
el("toneSeg").querySelectorAll("button").forEach(b=>b.onclick=()=>{
  el("toneSeg").querySelectorAll("button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");currentTone=b.dataset.tone;
  Object.values(state.pool).forEach(e=>{if(e.selected)regenerateIntro(e,currentTone);});
  save();renderWrite();
});
el("copyAll").onclick=()=>{
  const ids=Object.keys(state.pool).filter(id=>state.pool[id].selected);
  if(!ids.length){toast("投稿がありません");return;}
  const all=ids.map((id,i)=>`── 投稿 ${i+1} ──\n`+buildCommentText(state.pool[id])).join("\n\n\n");
  copy(all);toast(ids.length+"件の紹介文をまとめてコピーしました");
};
el("exportCsv").onclick=()=>{
  const ids=Object.keys(state.pool).filter(id=>state.pool[id].selected);
  if(!ids.length){toast("投稿がありません");return;}
  const rows=[["No","商品名","価格","評価","レビュー数","紹介文","ハッシュタグ","URL"]];
  ids.forEach((id,i)=>{const e=state.pool[id],p=e.product;
    const tags=Object.keys(e.tags).filter(t=>e.tags[t]).map(t=>"#"+t).join(" ");
    rows.push([i+1,p.name,p.price,p.reviewRate,p.reviewCount,e.intro.replace(/\n/g," "),tags,p.url]);});
  const csv="﻿"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download="rakuten_room_posts.csv";a.click();
  toast("CSVを書き出しました");
};

/* =====================  初期化  ===================== */
if(USE_API&&APP_ID){el("dataBanner").innerHTML="楽天API接続中。本物の商品検索が使えます。";}
updateBadges();
doSearch();  // 起動時にデモ一覧を表示
</script>
</body>
</html>
